# ~/.cortexbot/config.yaml
# CortexBot V2 configuration

telegram:
  bot_token: "${CORTEXBOT_TELEGRAM_TOKEN}"

# Projects are registered via /project-add from Telegram.
# You can also add them manually here.
projects: {}

defaults:
  token_budget: 500000
  timeouts:
    brainstorm: 900       # 15 minutes
    plan: 900
    execute: 1800         # 30 minutes
    review: 900
    chat: 600             # 10 minutes per message
    default: 900
  session_rotation:
    execute: 100          # event count threshold
  max_cycles: 3           # review/test retry limit
  chat:
    inactivity_timeout: 7200  # 2 hours

logging:
  invocation_logs: true
  retention_days: 30

claude:
  binary: "claude"
